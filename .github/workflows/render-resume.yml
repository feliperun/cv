name: Render resume HTML

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - scripts/generate-resume.js
      - .github/workflows/render-resume.yml
      - felipe-avatar.jpg
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: render-resume-html
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate HTML from README
        run: node scripts/generate-resume.js

      - name: Commit regenerated HTML
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: regenerate resume html [skip ci]"
          git push
