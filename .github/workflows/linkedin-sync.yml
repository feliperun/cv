name: Sync LinkedIn profile

# Runs on the user's SELF-HOSTED macOS runner (residential IP, logged-in GUI
# session for headed Chromium). Triggered when the resume content changes.
#
# Security (public repo):
#   - Only `push` to main (maintainer-only) and manual dispatch — never on
#     pull_request, so fork PRs cannot run on the self-hosted runner or read secrets.
#   - Secrets live in the `linkedin` Environment with a required reviewer, so every
#     run pauses for manual approval before the LinkedIn session is exposed.
#   - Also enable repo Settings → Actions → "Require approval for all outside
#     collaborators" (fork-PR runs). Consider pinning actions to commit SHAs.

on:
  push:
    branches: [main]
    paths:
      - README.md
      - README.pt-BR.md
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run (safe, no writes) or apply (edits the profile)"
        type: choice
        default: dry-run
        options: [dry-run, apply]

concurrency:
  group: linkedin-sync
  cancel-in-progress: false

permissions:
  contents: write # commit the idempotency snapshot back

jobs:
  sync:
    runs-on: [self-hosted, macOS]
    environment: linkedin # required-reviewer gate protects the secrets
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Sync LinkedIn profile
        env:
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_JSESSIONID: ${{ secrets.LINKEDIN_JSESSIONID }}
          LINKEDIN_VANITY: ${{ vars.LINKEDIN_VANITY }}
          CLOAKBROWSER_LICENSE_KEY: ${{ secrets.CLOAKBROWSER_LICENSE_KEY }}
          LINKEDIN_HEADLESS: "0" # headed — runner must have a GUI session
        run: |
          # push => apply (gated by the environment reviewer); dispatch honors the input.
          MODE="${{ github.event.inputs.mode || 'apply' }}"
          if [ "$MODE" = "apply" ]; then
            npm run linkedin:sync -- --apply
          else
            npm run linkedin:sync
          fi

      - name: Upload preview screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-preview
          path: .linkedin/preview/
          if-no-files-found: ignore

      - name: Commit idempotency snapshot
        if: success()
        run: |
          if git diff --quiet -- .linkedin/last-synced.*.json 2>/dev/null; then
            echo "no snapshot change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .linkedin/last-synced.*.json
          git commit -m "chore: update LinkedIn sync snapshot [skip ci]"
          git push
